name: Test DataForSEO coverage

# Run manually from the Actions tab (works from iPad browser).
# Checks whether DataForSEO returns Cork + Dublin flights and Ryanair.
# Uses your free trial credit — costs ~€0.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run the DataForSEO coverage test
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python test_dataforseo.py
