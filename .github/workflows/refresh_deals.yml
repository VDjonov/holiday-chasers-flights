name: Refresh flight deals

# Scans real return fares (per person) via FlightAPI.io and commits
# deals_cache.json back to the repo. GitHub Pages serves the result.

on:
  schedule:
    # Every 5 days (calendar days 1,6,11,16,21,26) at 05:00 UTC.
    # 8+8 boards × 26 destinations × 2 airports × 2 credits × 6 runs
    # = 9,984 credits/month — fits the FlightAPI Basic plan (10,000).
    - cron: "0 5 1,6,11,16,21,26 * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run the deal scan
        env:
          FLIGHTAPI_KEY: ${{ secrets.FLIGHTAPI_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY2: ${{ secrets.SERPAPI_KEY2 }}
          SERPAPI_KEY3: ${{ secrets.SERPAPI_KEY3 }}
          SERPAPI_KEY4: ${{ secrets.SERPAPI_KEY4 }}
          SERPAPI_KEY5: ${{ secrets.SERPAPI_KEY5 }}
        run: python refresh_deals.py

      - name: Commit the updated cache
        run: |
          git config user.name "deal-bot"
          git config user.email "deal-bot@users.noreply.github.com"
          git add deals_cache.json price_history.json
          git commit -m "Refresh flight deals (FlightAPI, per-person)" || echo "No changes to commit"
          git pull --rebase origin main
          git push
