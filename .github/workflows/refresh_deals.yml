name: Refresh flight deals

# Runs the deal scan daily and commits deals_cache.json back to the repo.
# GitHub Pages then serves the fresh deals — visitors pay zero quota.

on:
  schedule:
    # Daily at 05:00 UTC (early morning Irish time, deals fresh for the day).
    # Cork + Dublin × 26 destinations × 8 boards ≈ 416 searches/run.
    # SerpApi keys are tried first; DataForSEO fills in when they run out
    # (~€7/month on DataForSEO standard rates at this volume).
    - cron: "0 5 * * *"
  # Also allow manual runs from the GitHub "Actions" tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run the deal scan
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY2: ${{ secrets.SERPAPI_KEY2 }}
          SERPAPI_KEY3: ${{ secrets.SERPAPI_KEY3 }}
          SERPAPI_KEY4: ${{ secrets.SERPAPI_KEY4 }}
          SERPAPI_KEY5: ${{ secrets.SERPAPI_KEY5 }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python refresh_deals.py

      - name: Commit the updated cache
        run: |
          git config user.name "deal-bot"
          git config user.email "deal-bot@users.noreply.github.com"
          git add deals_cache.json price_history.json
          git commit -m "Refresh flight deals" || echo "No changes to commit"
          git push
